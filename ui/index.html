<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WP -> Eleventy Migrator</title>
    <style>
      :root {
        --bg: #efe6d8;
        --bg-grad-top: rgba(15, 118, 110, 0.14);
        --bg-grad-right: rgba(217, 119, 6, 0.12);
        --panel: rgba(255, 251, 244, 0.92);
        --panel-strong: #fffdf8;
        --ink: #1b1a18;
        --muted: #685f55;
        --line: rgba(27, 26, 24, 0.12);
        --accent: #0f766e;
        --accent-strong: #115e59;
        --accent-soft: rgba(15, 118, 110, 0.1);
        --danger: #b91c1c;
        --shadow: 0 26px 80px rgba(83, 59, 22, 0.14);
        --console-bg: #101411;
        --console-ink: #d7fce7;
        --control-bg: #fffdfa;
        --secondary-bg: #ebe4d7;
      }

      body[data-theme="dark"] {
        --bg: #111514;
        --bg-grad-top: rgba(45, 212, 191, 0.12);
        --bg-grad-right: rgba(245, 158, 11, 0.1);
        --panel: rgba(21, 28, 26, 0.9);
        --panel-strong: #19211f;
        --ink: #edf2ef;
        --muted: #9eb0aa;
        --line: rgba(237, 242, 239, 0.11);
        --accent: #2dd4bf;
        --accent-strong: #7eead8;
        --accent-soft: rgba(45, 212, 191, 0.12);
        --danger: #f87171;
        --shadow: 0 26px 80px rgba(0, 0, 0, 0.3);
        --console-bg: #09100e;
        --console-ink: #bbf7d0;
        --control-bg: #111917;
        --secondary-bg: #24302d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, var(--bg-grad-top), transparent 34%),
          radial-gradient(circle at right center, var(--bg-grad-right), transparent 28%),
          linear-gradient(180deg, color-mix(in srgb, var(--bg) 88%, white 12%) 0%, var(--bg) 100%);
        transition: background 150ms ease, color 150ms ease;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .shell {
        width: min(1280px, calc(100vw - 28px));
        margin: 24px auto 40px;
        display: grid;
        gap: 20px;
      }

      .hero,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero {
        padding: 28px;
        display: grid;
        grid-template-columns: 1.7fr 1fr;
        gap: 22px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
      }

      .topbar-controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .control-pill {
        display: grid;
        gap: 6px;
        min-width: 130px;
      }

      .control-pill span {
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .control-pill select {
        background: var(--control-bg);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent-strong);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.2rem, 5vw, 4.1rem);
        line-height: 0.94;
        letter-spacing: -0.05em;
      }

      .lede,
      .step-lede,
      .hint,
      .status,
      .meta,
      .card p,
      label span {
        color: var(--muted);
      }

      .lede {
        max-width: 60ch;
        line-height: 1.65;
      }

      .hero-side {
        display: grid;
        gap: 14px;
      }

      .card {
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 16px 18px;
      }

      .card strong {
        display: block;
        margin-bottom: 6px;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .chip {
        border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
        background: color-mix(in srgb, var(--panel-strong) 85%, transparent);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.92rem;
      }

      .layout {
        display: grid;
        grid-template-columns: 1.45fr 0.92fr;
        gap: 20px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .tab-button {
        background: var(--secondary-bg);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .tab-button.is-active {
        background: var(--accent);
        color: #fff;
      }

      .tab-panel[hidden] {
        display: none;
      }

      .panel {
        padding: 24px;
      }

      .tab-nav-panel {
        padding: 16px 20px;
      }

      .tab-blurb {
        margin: 0 0 16px;
      }

      form {
        display: grid;
        gap: 14px;
      }

      .step {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: color-mix(in srgb, var(--panel-strong) 92%, transparent);
        overflow: hidden;
      }

      .step summary {
        list-style: none;
        cursor: pointer;
        padding: 18px 20px;
      }

      .step summary::-webkit-details-marker {
        display: none;
      }

      .step-head {
        display: grid;
        grid-template-columns: auto 1fr auto auto;
        gap: 14px;
        align-items: center;
      }

      .step-number {
        width: 38px;
        height: 38px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-weight: 800;
      }

      .step-title {
        margin: 0;
        font-size: 1.08rem;
      }

      .step-lede {
        margin: 4px 0 0;
        font-size: 0.95rem;
      }

      .step-toggle {
        color: var(--accent-strong);
        flex-shrink: 0;
      }

      .phase-switch {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        user-select: none;
      }

      .phase-switch input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .phase-switch-ui {
        width: 52px;
        height: 30px;
        border-radius: 999px;
        position: relative;
        background: color-mix(in srgb, var(--muted) 35%, transparent);
        border: 1px solid var(--line);
        transition: background 140ms ease;
      }

      .phase-switch-ui::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
        transition: transform 140ms ease;
      }

      .phase-switch input:checked + .phase-switch-ui {
        background: var(--accent);
      }

      .phase-switch input:checked + .phase-switch-ui::after {
        transform: translateX(22px);
      }

      .phase-switch-label {
        font-size: 0.84rem;
        color: var(--muted);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .step-chevron {
        width: 22px;
        height: 22px;
        transition: transform 200ms ease;
        display: block;
      }

      details[open] > summary .step-chevron {
        transform: rotate(90deg);
      }

      .step-body {
        padding: 0 20px 20px;
        display: grid;
        gap: 18px;
      }

      .step.is-inactive {
        opacity: 0.74;
      }

      .step-phase-note {
        margin: 0;
        font-size: 0.88rem;
        color: var(--muted);
      }

      .phase-quick {
        display: grid;
        gap: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: var(--panel-strong);
      }

      .phase-row {
        display: grid;
        gap: 12px;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
      }

      .phase-row.phase-row-3 {
        grid-template-columns: minmax(0, 1fr) auto auto;
      }

      .phase-progress {
        display: grid;
        gap: 8px;
      }

      .phase-progress-bar {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: var(--secondary-bg);
        border: 1px solid var(--line);
      }

      .phase-progress-bar span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent-strong) 72%, white 28%));
        transition: width 180ms ease;
      }

      .phase-progress-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .phase-disclosure {
        border: 1px dashed color-mix(in srgb, var(--accent) 28%, transparent);
        border-radius: 16px;
        background: color-mix(in srgb, var(--accent-soft) 72%, transparent);
        overflow: hidden;
      }

      .phase-disclosure summary {
        list-style: none;
        cursor: pointer;
        padding: 14px 16px;
      }

      .phase-disclosure summary::-webkit-details-marker {
        display: none;
      }

      .phase-disclosure-body {
        padding: 0 16px 16px;
        display: grid;
        gap: 18px;
      }

      .subsection-disclosure {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel-strong);
        overflow: hidden;
      }

      .subsection-disclosure summary {
        list-style: none;
        cursor: pointer;
        padding: 14px 16px;
      }

      .subsection-disclosure summary::-webkit-details-marker {
        display: none;
      }

      .subsection-head {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .subsection-chevron {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        color: var(--accent-strong);
        transition: transform 180ms ease;
      }

      .subsection-disclosure[open] .subsection-chevron {
        transform: rotate(90deg);
      }

      .subsection-body {
        padding: 0 16px 16px;
        display: grid;
        gap: 18px;
      }

      .recommendation-list,
      .plugin-check-grid {
        display: grid;
        gap: 10px;
      }

      .recommendation-list li {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        background: var(--panel-strong);
        color: var(--muted);
      }

      .plugin-check-grid label {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel-strong);
      }

      .plugin-check-grid input {
        width: 18px;
        height: 18px;
        margin-top: 2px;
      }

      .plugin-compare-table {
        display: grid;
        gap: 10px;
      }

      .plugin-compare-row,
      .plugin-compare-head {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) minmax(220px, 1.2fr) auto;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel-strong);
      }

      .plugin-compare-head {
        background: color-mix(in srgb, var(--accent-soft) 78%, transparent);
        color: var(--accent-strong);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.78rem;
      }

      .plugin-compare-row strong {
        display: block;
        margin-bottom: 4px;
      }

      .plugin-compare-row .meta {
        font-size: 0.82rem;
      }

      .plugin-switch {
        justify-self: end;
      }

      .phase-actions-footer {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .continue-glow {
        position: relative;
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 42%, transparent);
        animation: continuePulse 1.6s ease-in-out infinite;
      }

      @keyframes continuePulse {
        0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 34%, transparent); }
        70% { box-shadow: 0 0 0 14px color-mix(in srgb, var(--accent) 0%, transparent); }
        100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 0%, transparent); }
      }

      .step[aria-disabled="true"] {
        opacity: 0.58;
        pointer-events: none;
      }

      .section-head {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .section-title {
        margin: 0;
        font-size: 1rem;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-1 {
        grid-template-columns: 1fr;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }

      .field-head {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        background: var(--control-bg);
        color: var(--ink);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .toggle-row {
        display: grid;
        gap: 12px;
      }

      .toggle {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel-strong);
      }

      .toggle input {
        width: 18px;
        height: 18px;
        margin-top: 2px;
      }

      .subtle-box {
        border: 1px dashed color-mix(in srgb, var(--accent) 30%, transparent);
        border-radius: 16px;
        padding: 16px;
        background: color-mix(in srgb, var(--accent-soft) 80%, transparent);
      }

      .subtle-box p {
        margin: 0;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 4px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        cursor: pointer;
        transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
        transform: none;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        background: var(--secondary-bg);
        color: var(--ink);
      }

      .help-button {
        display: inline-grid;
        place-items: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
        background: color-mix(in srgb, var(--accent-soft) 80%, transparent);
        color: var(--accent-strong);
        font-weight: 800;
        line-height: 1;
      }

      .status {
        min-height: 24px;
        font-size: 0.96rem;
      }

      .status.error {
        color: var(--danger);
      }

      .side-stack {
        display: grid;
        gap: 20px;
        align-content: start;
      }

      .side-title {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .plan-list,
      .check-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      .plan-list li,
      .check-list li {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px 16px;
        background: var(--panel-strong);
      }

      .plugin-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .plugin-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: var(--panel-strong);
        display: grid;
        gap: 10px;
      }

      .plugin-card h3 {
        margin: 0;
        font-size: 1rem;
      }

      .plugin-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .plugin-badge {
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.8rem;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--accent-soft) 80%, transparent);
        color: var(--accent-strong);
      }

      .plugin-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .plugin-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        display: grid;
        gap: 8px;
      }

      .plan-list strong,
      .check-list strong {
        display: block;
        margin-bottom: 4px;
      }

      .result {
        background: var(--console-bg);
        color: var(--console-ink);
        border-radius: 18px;
        padding: 18px;
        overflow: auto;
        min-height: 320px;
      }

      .result pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.9rem;
        line-height: 1.55;
      }

      #result-raw-details summary {
        cursor: pointer;
        font-size: 0.82rem;
        color: var(--muted);
        padding: 4px 0 8px;
        user-select: none;
      }

      #result-view { font-size: 0.88rem; line-height: 1.6; }
      #result-view .rv-title { font-weight: 700; font-size: 1rem; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
      #result-view .rv-badge { font-size: 0.72rem; font-weight: 600; letter-spacing: .04em; padding: 2px 8px; border-radius: 99px; background: var(--accent-soft); color: var(--accent); }
      #result-view .rv-section { margin: 12px 0 4px; font-weight: 600; color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: .06em; }
      #result-view .rv-row { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; border-bottom: 1px solid var(--line); }
      #result-view .rv-row span:last-child { color: var(--muted); font-size: 0.82rem; font-family: "SFMono-Regular", monospace; }
      #result-view .rv-warn { color: var(--danger); font-size: 0.8rem; margin: 2px 0; }
      #result-view .rv-step { color: var(--accent); font-size: 0.82rem; margin: 2px 0; }
      #result-view ul { margin: 4px 0 8px; padding-left: 18px; }

      .log-summary {
        display: grid;
        gap: 12px;
      }

      .log-summary-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px 16px;
        background: var(--panel-strong);
      }

      .log-summary-card h3,
      .log-summary-card h4,
      .log-summary-card p {
        margin: 0;
      }

      .log-summary-card h3,
      .log-summary-card h4 {
        margin-bottom: 6px;
      }

      .log-summary-card p,
      .log-summary-card li {
        color: var(--muted);
        line-height: 1.6;
      }

      .log-summary-card ul {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      .auth-fields[hidden],
      .domain-fields[hidden],
      .nunjucks-fields[hidden] {
        display: none;
      }

      dialog.help-dialog {
        width: min(640px, calc(100vw - 24px));
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 0;
        background: var(--panel-strong);
        color: var(--ink);
        box-shadow: var(--shadow);
      }

      dialog.help-dialog::backdrop {
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(4px);
      }

      .help-shell {
        padding: 24px;
        display: grid;
        gap: 16px;
      }

      .help-topbar {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
      }

      .help-topbar h3 {
        margin: 0;
        font-size: 1.35rem;
      }

      .help-close {
        min-width: 42px;
        height: 42px;
        padding: 0;
        background: var(--secondary-bg);
        color: var(--ink);
      }

      .help-body {
        color: var(--muted);
        line-height: 1.65;
      }

      .help-body p,
      .help-body ul {
        margin: 0 0 12px;
      }

      .help-body ul {
        padding-left: 18px;
      }

      /* ── Focus states ─────────────────────────────────────────────── */
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
      }

      input,
      select,
      textarea {
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }

      /* ── Button variants hover ─────────────────────────────────────── */
      .primary:hover:not(:disabled) {
        background: var(--accent-strong);
      }

      .secondary:hover:not(:disabled) {
        background: color-mix(in srgb, var(--secondary-bg) 80%, var(--accent-soft) 20%);
      }

      .tab-button:hover:not(.is-active) {
        background: color-mix(in srgb, var(--secondary-bg) 70%, var(--accent-soft) 30%);
        border-color: color-mix(in srgb, var(--line) 60%, var(--accent) 40%);
      }

      .tab-button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 30%, transparent);
      }

      .help-button:hover {
        background: color-mix(in srgb, var(--accent-soft) 100%, var(--accent) 10%);
        border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      }

      .help-button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 28%, transparent);
      }

      .help-close:hover {
        background: color-mix(in srgb, var(--secondary-bg) 70%, var(--line) 30%);
      }

      /* ── Toggle hover ──────────────────────────────────────────────── */
      .toggle:hover {
        border-color: color-mix(in srgb, var(--line) 50%, var(--accent) 50%);
        background: color-mix(in srgb, var(--panel-strong) 85%, var(--accent-soft) 15%);
      }

      /* ── Step summary hover ────────────────────────────────────────── */
      .step summary:hover {
        background: color-mix(in srgb, var(--panel-strong) 90%, var(--accent-soft) 10%);
      }

      .step summary:focus-visible {
        outline: none;
        box-shadow: inset 0 0 0 2px var(--accent);
      }

      /* ── Links ─────────────────────────────────────────────────────── */
      a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      a:hover {
        color: var(--accent-strong);
      }

      /* ── Server status ─────────────────────────────────────────────── */
      .server-status {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 0.8rem;
        color: var(--muted);
        min-width: 90px;
        align-self: flex-end;
        padding-bottom: 4px;
      }

      .server-status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
        transition: background 300ms ease;
      }

      .server-status.is-online::before { background: #4ade80; }
      .server-status.is-offline::before { background: var(--danger); }

      /* ── Migration log ─────────────────────────────────────────────── */
      #migration-log {
        background: var(--console-bg);
        color: var(--console-ink);
        border-radius: 18px;
        padding: 14px 16px;
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.82rem;
        line-height: 1.6;
        max-height: 280px;
        overflow-y: auto;
        margin-bottom: 10px;
        scroll-behavior: smooth;
      }
      #migration-log .log-item { display: flex; gap: 8px; }
      #migration-log .log-ok   { color: #4ade80; }
      #migration-log .log-warn { color: #fbbf24; }
      #migration-log .log-info { color: #94a3b8; }
      #migration-log .log-item-row { color: #64748b; }

      /* ── Result view container ─────────────────────────────────────── */
      #result-view .rv-body {
        padding: 2px 0 8px;
      }

      #result-view {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px 18px;
        background: var(--panel-strong);
        margin-bottom: 12px;
      }

      /* ── Pagination buttons ────────────────────────────────────────── */
      #plugin-prev-button,
      #plugin-next-button {
        min-width: 80px;
      }

      @media (max-width: 980px) {
        .hero,
        .layout,
        .grid,
        .topbar,
        .plugin-grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          display: grid;
        }
      }

      @media (max-width: 600px) {
        .shell {
          margin: 12px auto 24px;
        }

        .hero,
        .panel {
          border-radius: 18px;
        }

        .step {
          border-radius: 16px;
        }

        .result {
          min-height: 200px;
        }

        .actions {
          flex-direction: column;
        }

        .actions button {
          width: 100%;
          justify-content: center;
        }
      }

      /* ── Analysis result card tweaks ───────────────────────────────── */

      function t(key) {
        return translations[currentLang][key] ?? key;
      }

      function applyTranslations() {
        document.documentElement.lang = currentLang;
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          node.textContent = t(node.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
          node.placeholder = t(node.dataset.i18nPlaceholder);
        });
        document.title = t("hero_title");
        renderChecklist();
        renderPlan();
        renderStylesPanel();
        renderPluginAudit();
        renderLogSummary();
        if (latestRunKind === "analysis" && latestAnalysisReport) renderAnalysisResult(latestAnalysisReport);
        if (latestRunKind === "migration" && latestMigrationReport) renderMigrationResult(latestMigrationReport, getPayload().dryRun);
        renderAnalyzeChecklist();
      }

      function renderChecklist() {
        checklist.innerHTML = translations[currentLang].checklist_items.map(([title, body]) => `
          <li>
            <strong>${title}</strong>
            <span class="meta">${body}</span>
          </li>
        `).join("");
      }

      function mergedPluginItems() {
        const seen = new Set();
        const merged = [];
        for (const item of [...pluginAuditData[currentLang], ...commonPluginAuditData[currentLang]]) {
          const key = String(item.slug || item.name).toLowerCase();
          if (seen.has(key)) continue;
          seen.add(key);
          merged.push(item);
        }
        return merged;
      }

      function renderPluginAudit() {
        const query = String(pluginFilterInput.value || "").trim().toLowerCase();
        const allItems = mergedPluginItems();
        const items = allItems.filter((item) =>
          !query ||
          item.name.toLowerCase().includes(query) ||
          String(item.slug || "").toLowerCase().includes(query) ||
          item.category.toLowerCase().includes(query)
        );

        const totalPages = Math.max(1, Math.ceil(items.length / commonPluginsPerPage));
        if (commonPluginPage > totalPages) commonPluginPage = totalPages;
        const start = (commonPluginPage - 1) * commonPluginsPerPage;
        const pageItems = items.slice(start, start + commonPluginsPerPage);

        pluginGrid.innerHTML = pageItems.map((item) => `
          <article class="plugin-card">
            <div>
              <h3>${item.name}</h3>
            </div>
            <div class="plugin-meta">
              <span class="plugin-badge">${item.category}</span>
              <span class="plugin-badge">${item.effort}</span>
              ${item.slug ? `<span class="plugin-badge">${item.slug}</span>` : ""}
            </div>
            <p><strong>${t("plugin_replacement_label")}:</strong> ${item.replacement}</p>
            <p>${item.note}</p>
          </article>
        `).join("");

        pluginSummary.innerHTML = translations[currentLang].plugin_summary_items.map(([title, body]) => `
          <li>
            <strong>${title}</strong>
            <span class="meta">${body}</span>
          </li>
        `).join("");

        pluginRisks.innerHTML = translations[currentLang].plugin_risk_items.map((item) => `<li>${item}</li>`).join("");
        pluginPageStatus.textContent = t("plugin_page_status")
          .replace("{page}", String(commonPluginPage))
          .replace("{pages}", String(totalPages))
          .replace("{count}", String(items.length));

        pluginPrevButton.disabled = commonPluginPage <= 1;
        pluginNextButton.disabled = commonPluginPage >= totalPages;
      }

      function renderStylesPanel() {
        const data = new FormData(form);
        const preset = data.get("preset") || "none";
        const renderMode = [
          data.get("useNunjucksLayouts") === "on" ? t("styles_render_nunjucks_on") : t("styles_render_nunjucks_off"),
          data.get("convertKadenceBlocks") === "on" ? t("styles_render_kadence_on") : t("styles_render_kadence_off")
        ].join(" / ");
        const stylesMode = data.get("migrateStyles") === "on" ? t("phase_active_text") : t("phase_inactive_text");

        stylesSummary.innerHTML = translations[currentLang].styles_summary_items.map(([title, template]) => {
          const text = template
            .replace("{preset}", preset)
            .replace("{render}", renderMode)
            .replace("{styles}", stylesMode);
          return `<li><strong>${title}</strong><span class="meta">${text}</span></li>`;
        }).join("");

        const kadenceDir = data.get("kadenceBlocksDir") || "_includes/blocks/kadence";
        const stylesDir = data.get("stylesDir") || "styles/legacy";
        stylesOutputs.innerHTML = translations[currentLang].styles_output_items.map(([title, template]) => {
          const text = template
            .replace("{kadenceDir}", kadenceDir)
            .replace("{stylesDir}", stylesDir);
          return `<li><strong>${title}</strong><span class="meta">${text}</span></li>`;
        }).join("");
      }

      function setActiveTab(tabId) {
        currentTab = tabId;
        workflowTab.hidden = tabId !== "workflow-tab";
        stylesTab.hidden = tabId !== "styles-tab";
        pluginsTab.hidden = tabId !== "plugins-tab";
        logTab.hidden = tabId !== "log-tab";
        tabButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.tabTarget === tabId);
        });
      }

      function setTheme(theme) {
        currentTheme = theme;
        document.body.dataset.theme = theme;
      }

      function setBusy(isBusy) {
        saveButton.disabled = isBusy;
        analyzeButton.disabled = isBusy;
        runButton.disabled = isBusy;
        dryRunButton.disabled = isBusy;
        runButton.textContent = isBusy ? t("btn_running") : t("btn_run");
      }

      function setStatus(message, isError = false) {
        statusNode.textContent = message;
        statusNode.classList.toggle("error", isError);
      }

      function setPhaseProgress(phase, percent, messageKeyOrText) {
        const clamped = Math.max(0, Math.min(100, Number(percent) || 0));
        const fill = phase === "analysis" ? analysisProgressFill : migrationProgressFill;
        const text = phase === "analysis" ? analysisProgressText : migrationProgressText;
        const value = phase === "analysis" ? analysisProgressValue : migrationProgressValue;
        fill.style.width = `${clamped}%`;
        text.textContent = translations[currentLang][messageKeyOrText] ?? messageKeyOrText;
        value.textContent = `${clamped}%`;
      }

      function updateStepAvailability() {
        const phases = getPhaseState();
        const analysisReady = Boolean(latestAnalysisReport?.analysis);
        const localEnabled = phases.local && analysisReady;
        migrationStep.setAttribute("aria-disabled", localEnabled ? "false" : "true");
        if (!localEnabled) migrationStep.open = false;
      }

      function applyAnalysisSuggestions(report) {
        if (!report?.analysis) return;
        const analysis = report.analysis;
        const recommendedPreset = analysis.theme?.proSignals ? "kadence-pro" : analysis.theme?.kadence ? "kadence" : "none";
        presetSelect.value = recommendedPreset;
        form.elements.namedItem("restNamespace").value = analysis.rest?.recommendedNamespace || "/wp-json/wp/v2";
        form.elements.namedItem("useNunjucksLayouts").checked = recommendedPreset !== "none";
        form.elements.namedItem("convertKadenceBlocks").checked = recommendedPreset === "kadence" || recommendedPreset === "kadence-pro";
        form.elements.namedItem("migrateStyles").checked = recommendedPreset === "kadence" || recommendedPreset === "kadence-pro";
        form.elements.namedItem("contentTypes").value = Object.keys(analysis.structure?.contentCounts || {}).join(",") || "posts,pages";
        form.elements.namedItem("htmlMode").value = recommendedPreset === "none" ? "keep-html" : "keep-html";
        form.elements.namedItem("createRedirects").checked = true;
        form.elements.namedItem("importMenus").checked = true;
        if (analysis.menus?.detected === 0) form.elements.namedItem("importMenus").checked = true;
        applyPresetDefaults();
        applyProjectDefaults(form.elements.namedItem("localProjectFolder").value, false);
        updateNunjucksVisibility();
      }

      function renderAnalysisSuggestions(report) {
        if (!report?.analysis) {
          analysisRecommendations.hidden = true;
          openLogAfterAnalysisButton.disabled = true;
          continueToMigrationButton.disabled = true;
          continueToMigrationButton.classList.remove("continue-glow");
          return;
        }
        const analysis = report.analysis;
        analysisRecommendations.hidden = false;
        openLogAfterAnalysisButton.disabled = false;
        continueToMigrationButton.disabled = false;
        continueToMigrationButton.classList.add("continue-glow");
        analysisRecommendationList.innerHTML = [
          `${t("analysis_summary_theme")}: ${analysis.theme?.slug || "-"}`,
          `${t("field_restNamespace")}: ${analysis.rest?.recommendedNamespace || "/wp-json/wp/v2"}`,
          `${t("analysis_summary_languages")}: ${(analysis.structure?.languages || []).join(", ") || "-"}`,
          `${t("analysis_summary_content")}: posts ${analysis.structure?.contentCounts?.posts ?? 0}, pages ${analysis.structure?.contentCounts?.pages ?? 0}`,
          ...((analysis.recommendations || []).slice(0, 3))
        ].map((item) => `<li>${item}</li>`).join("");

        analysisPluginCheckboxes.innerHTML = (analysis.plugins || []).map((plugin) => {
          const replacement = eleventyReplacementCatalog[plugin.slug] || {
            eleventy: t("plugin_compare_fallback"),
            packageName: "@11ty/eleventy + custom integration"
          };
          return `
            <div class="plugin-compare-row">
              <div>
                <strong>${plugin.name}</strong>
                <span class="meta">${plugin.signal}</span>
              </div>
              <div>
                <strong>${replacement.eleventy}</strong>
                <span class="meta">${replacement.packageName}</span>
              </div>
              <label class="phase-switch plugin-switch">
                <input
                  type="checkbox"
                  checked
                  data-plugin-slug="${plugin.slug}"
                  data-plugin-name="${plugin.name}"
                  data-eleventy-solution="${replacement.eleventy}"
                  data-package-name="${replacement.packageName}"
                >
                <span class="phase-switch-ui" aria-hidden="true"></span>
              </label>
            </div>
          `;
        }).join("");
      }

      function updateAuthVisibility() {
        appPasswordFields.hidden = authMode.value !== "app-password";
        bearerFields.hidden = authMode.value !== "bearer";
      }

      function updateDomainVisibility() {
        domainFields.hidden = !useCustomDomain.checked;
      }

      function updateNunjucksVisibility() {
        nunjucksFields.hidden = !(useNunjucksLayouts.checked || convertKadenceBlocks.checked);
      }

      function suggestConfigPath(outputRoot) {
        const base = String(outputRoot || "").replace(/\/+$/, "");
        return base ? `${base}/migration-config.json` : "./migrations/wp-to-eleventy/migration-config.json";
      }

      function slugFromUrl(url) {
        try {
          return new URL(String(url || "")).hostname.replace(/^www\./, "").replace(/[^a-z0-9.-]+/gi, "-");
        } catch {
          return "site";
        }
      }

      function deriveProjectDefaults(folderValue = "") {
        const folder = String(folderValue || "").trim().replace(/\/+$/, "");
        const siteSlug = slugFromUrl(form.elements.namedItem("wpBaseUrl").value || "");
        if (!folder) {
          return {
            outputRoot: "",
            configPath: "",
            contentDir: "content",
            mediaDir: "media",
            dataDir: "_data",
            localDevCommand: "npx @11ty/eleventy --serve",
            localSiteUrl: "http://127.0.0.1:8080/"
          };
        }
        return {
          outputRoot: folder,
          configPath: `${folder}/migration-config.json`,
          contentDir: "content",
          mediaDir: "media",
          dataDir: "_data",
          localDevCommand: "npx @11ty/eleventy --serve",
          localSiteUrl: "http://127.0.0.1:8080/",
          githubRepo: siteSlug
        };
      }

      function applyProjectDefaults(folderValue, force = false) {
        const defaults = deriveProjectDefaults(folderValue);
        const mappings = [
          ["outputRoot", defaults.outputRoot],
          ["configPath", defaults.configPath],
          ["contentDir", defaults.contentDir],
          ["mediaDir", defaults.mediaDir],
          ["dataDir", defaults.dataDir],
          ["localDevCommand", defaults.localDevCommand],
          ["localSiteUrl", defaults.localSiteUrl],
          ["githubRepo", defaults.githubRepo]
        ];
        for (const [name, value] of mappings) {
          const field = form.elements.namedItem(name);
          if (!field || value == null) continue;
          const empty = !String(field.value || "").trim();
          if (force || empty) field.value = value;
        }
        lastSuggestedConfigPath = form.elements.namedItem("configPath").value;
        renderPlan();
      }

      function openHelp(topic) {
        const entry = helpContent[topic]?.[currentLang];
        if (!entry) return;
        helpTitle.textContent = entry.title;
        helpBody.innerHTML = entry.body;
        helpDialog.showModal();
      }

      function getPayload() {
        const data = new FormData(form);
        return {
          preset: data.get("preset"),
          sourceType: data.get("sourceType"),
          wpBaseUrl: data.get("wpBaseUrl"),
          restNamespace: data.get("restNamespace"),
          contentTypes: data.get("contentTypes"),
          includeDrafts: data.get("includeDrafts") === "on",
          downloadMedia: data.get("downloadMedia") === "on",
          createRedirects: data.get("createRedirects") === "on",
          importMenus: data.get("importMenus") === "on",
          htmlMode: data.get("htmlMode"),
          targetPermalinkPattern: data.get("targetPermalinkPattern"),
          authMode: data.get("authMode"),
          wpUser: data.get("wpUser"),
          wpAppPassword: data.get("wpAppPassword"),
          wpBearerToken: data.get("wpBearerToken"),
          dryRun: data.get("dryRun") === "on",
          useNunjucksLayouts: data.get("useNunjucksLayouts") === "on",
          convertKadenceBlocks: data.get("convertKadenceBlocks") === "on",
          migrateStyles: data.get("migrateStyles") === "on",
          pageLayout: data.get("pageLayout"),
          postLayout: data.get("postLayout"),
          defaultLayout: data.get("defaultLayout"),
          kadenceBlocksDir: data.get("kadenceBlocksDir"),
          stylesDir: data.get("stylesDir"),
          eleventyReplacements: getSelectedEleventyReplacements(),
          localProjectFolder: data.get("localProjectFolder"),
          outputRoot: data.get("outputRoot"),
          contentDir: data.get("contentDir"),
          mediaDir: data.get("mediaDir"),
          dataDir: data.get("dataDir"),
          configPath: data.get("configPath")
        };
      }

      function getSelectedEleventyReplacements() {
        return Array.from(document.querySelectorAll("#analysis-plugin-checkboxes [data-plugin-slug]")).map((input) => ({
          slug: input.dataset.pluginSlug,
          wordpressPlugin: input.dataset.pluginName,
          eleventySolution: input.dataset.eleventySolution,
          packageName: input.dataset.packageName,
          enabled: input.checked
        }));
      }

      function getPhaseState() {
        const data = new FormData(form);
        return {
          analyze: data.get("phaseAnalyzeActive") === "on",
          local: data.get("phaseLocalActive") === "on",
          publish: data.get("phasePublishActive") === "on"
        };
      }

      function getPlanState() {
        const data = new FormData(form);
        return {
          phases: getPhaseState(),
          wpBaseUrl: data.get("wpBaseUrl"),
          contentTypes: data.get("contentTypes"),
          localProjectFolder: data.get("localProjectFolder"),
          outputRoot: data.get("outputRoot"),
          localDevCommand: data.get("localDevCommand"),
          localSiteUrl: data.get("localSiteUrl"),
          githubOwner: data.get("githubOwner"),
          githubRepo: data.get("githubRepo"),
          pagesUrl: data.get("pagesUrl"),
          buildCommand: data.get("buildCommand"),
          useGitHubActions: data.get("useGitHubActions") === "on",
          publishOnPush: data.get("publishOnPush") === "on",
          useCustomDomain: data.get("useCustomDomain") === "on",
          domainAction: data.get("domainAction"),
          desiredDomain: data.get("desiredDomain"),
          registrar: data.get("registrar"),
          dnsNotes: data.get("dnsNotes")
        };
      }

      function renderPlan() {
        const state = getPlanState();
        const phases = state.phases;
        const planLabels = translations[currentLang].plan_labels;
        const planText = translations[currentLang].plan_text;
        const repoLabel = state.githubOwner && state.githubRepo ? `${state.githubOwner}/${state.githubRepo}` : planText.missingRepo;
        const domainLine = state.useCustomDomain
          ? `${state.domainAction === "point-existing" ? planText.existingDomain : planText.newDomain}: ${state.desiredDomain || "-"}; registrar ${state.registrar || "-"}; ${state.dnsNotes || planText.dnsMissing}`
          : planText.noDomain;

        const items = [
          {
            title: planLabels.p0_analyze,
            text: phases.analyze
              ? `${state.wpBaseUrl || "-"}; ${planText.analysisActive}`
              : planText.phaseInactive
          },
          {
            title: planLabels.p1_extract,
            text: phases.local
              ? `${state.wpBaseUrl || "-"} -> ${state.contentTypes || "posts,pages"}`
              : planText.phaseInactive
          },
          {
            title: planLabels.p1_output,
            text: phases.local
              ? `${state.localProjectFolder || planText.missingProject}; ${state.outputRoot || "./migrations/..."}`
              : planText.phaseInactive
          },
          {
            title: planLabels.p1_local,
            text: phases.local
              ? `${state.localDevCommand || "npx @11ty/eleventy --serve"} -> ${state.localSiteUrl || "http://127.0.0.1:8080/"}`
              : planText.phaseInactive
          },
          {
            title: planLabels.p2_repo,
            text: phases.publish
              ? `${repoLabel} -> ${state.pagesUrl || "https://username.github.io/repo/"}`
              : planText.phaseInactive
          },
          {
            title: planLabels.p2_actions,
            text: phases.publish
              ? state.useGitHubActions
                ? `${state.buildCommand || "npx @11ty/eleventy"}; ${state.publishOnPush ? planText.deployPush : planText.deployManual}`
                : planText.actionsDisabled
              : planText.phaseInactive
          },
          {
            title: planLabels.p2_domain,
            text: phases.publish ? domainLine : planText.phaseInactive
          }
        ];

        planPreview.innerHTML = items.map((item) => `
          <li>
            <strong>${item.title}</strong>
            <span class="meta">${item.text}</span>
          </li>
        `).join("");

        renderWorkflowFocus();
        renderLogSummary();
        updateStepAvailability();
      }

      function renderWorkflowFocus() {
        const phases = getPhaseState();
        workflowFocus.innerHTML = translations[currentLang].workflow_focus_items.map(([title, key]) => `
          <li>
            <strong>${title}</strong>
            <span class="meta">${phases[key] ? t("phase_active_text") : t("phase_inactive_text")}</span>
          </li>
        `).join("");

        document.querySelectorAll(".step").forEach((step, index) => {
          const key = index === 0 ? "analyze" : index === 1 ? "local" : "publish";
          step.classList.toggle("is-inactive", !phases[key]);
        });
      }

      function buildRawExport() {
        return {
          phases: getPhaseState(),
          deploymentPlan: getPlanState(),
          analysisReport: latestAnalysisReport,
          migrationReport: latestMigrationReport
        };
      }

      function fillForm(values) {
        Object.entries(values).forEach(([key, value]) => {
          const field = form.elements.namedItem(key);
          if (!field) return;
          if (field.type === "checkbox") field.checked = Boolean(value);
          else field.value = value ?? "";
        });

        const defaults = {
          phaseAnalyzeActive: true,
          phaseLocalActive: false,
          phasePublishActive: false,
          preset: "none",
          githubOwner: "",
          githubRepo: "",
          pagesUrl: "",
          localProjectFolder: "",
          localDevCommand: "npx @11ty/eleventy --serve",
          localSiteUrl: "http://127.0.0.1:8080/",
          buildCommand: "npx @11ty/eleventy",
          useGitHubActions: true,
          publishOnPush: true,
          useCustomDomain: false,
          useNunjucksLayouts: false,
          convertKadenceBlocks: false,
          migrateStyles: false,
          pageLayout: "layouts/page.njk",
          postLayout: "layouts/post.njk",
          defaultLayout: "",
          kadenceBlocksDir: "_includes/blocks/kadence",
          stylesDir: "styles/legacy",
          dataDir: "_data",
          domainAction: "buy-new",
          desiredDomain: "",
          registrar: "",
          dnsNotes: ""
        };

        Object.entries(defaults).forEach(([key, value]) => {
          const field = form.elements.namedItem(key);
          if (!field) return;
          if (field.type === "checkbox") field.checked = Boolean(value);
          else if (!field.value) field.value = value;
        });

        lastSuggestedConfigPath = configPathField.value;
        updateAuthVisibility();
        updateDomainVisibility();
        updateNunjucksVisibility();
        renderPlan();
        renderStylesPanel();
        renderWorkflowFocus();
        renderLogSummary();
        updateStepAvailability();
        setPhaseProgress("analysis", 0, "progress_waiting_analysis");
        setPhaseProgress("migration", 0, "progress_waiting_migration");
      }

      function applyPresetDefaults() {
        if (presetSelect.value !== "kadence" && presetSelect.value !== "kadence-pro") return;
        form.elements.namedItem("htmlMode").value = "keep-html";
        form.elements.namedItem("useNunjucksLayouts").checked = true;
        form.elements.namedItem("convertKadenceBlocks").checked = true;
        form.elements.namedItem("migrateStyles").checked = true;
        if (!form.elements.namedItem("pageLayout").value) form.elements.namedItem("pageLayout").value = "layouts/page.njk";
        if (!form.elements.namedItem("postLayout").value) form.elements.namedItem("postLayout").value = "layouts/post.njk";
        if (!form.elements.namedItem("kadenceBlocksDir").value || form.elements.namedItem("kadenceBlocksDir").value === "_includes/blocks/kadence") {
          form.elements.namedItem("kadenceBlocksDir").value = "_includes/blocks/kadence";
        }
        if (
          !form.elements.namedItem("stylesDir").value ||
          form.elements.namedItem("stylesDir").value === "styles/legacy" ||
          form.elements.namedItem("stylesDir").value === "styles/kadence-legacy" ||
          form.elements.namedItem("stylesDir").value === "styles/kadence-pro-legacy"
        ) {
          form.elements.namedItem("stylesDir").value = presetSelect.value === "kadence-pro"
            ? "styles/kadence-pro-legacy"
            : "styles/kadence-legacy";
        }
        updateNunjucksVisibility();
      }

      async function fetchJson(url, options = {}) {
        let response;
        try {
          response = await fetch(url, options);
        } catch {
          throw new Error(t("error_server_down"));
        }
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        return data;
      }

      async function callApi(url, payload) {
        return fetchJson(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      }

      async function loadDefaults() {
        resultNode.textContent = t("result_loading");
        const data = await fetchJson("/api/defaults");
        fillForm(data);
        latestRawExport = data;
        resultNode.textContent = JSON.stringify(data, null, 2);
        setStatus(t("status_defaults_loaded"));
      }

      const serverStatusNode = document.getElementById("server-status");

      async function pingServer() {
        try {
          await fetch("/api/ping");
          serverStatusNode.className = "server-status is-online";
          serverStatusNode.textContent = t("server_online");
        } catch {
          serverStatusNode.className = "server-status is-offline";
          serverStatusNode.textContent = t("server_offline");
        }
      }

      pingServer();
      setInterval(pingServer, 6000);

      languageSelect.addEventListener("change", () => {
        currentLang = languageSelect.value;
        applyTranslations();
        pingServer();
      });

      themeSelect.addEventListener("change", () => {
        setTheme(themeSelect.value);
      });

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => setActiveTab(button.dataset.tabTarget));
      });

      document.querySelectorAll(".phase-switch").forEach((node) => {
        node.addEventListener("click", (event) => event.stopPropagation());
      });

      presetSelect.addEventListener("change", () => {
        applyPresetDefaults();
        renderPlan();
        renderStylesPanel();
      });

      form.querySelectorAll('input[name="phaseAnalyzeActive"], input[name="phaseLocalActive"], input[name="phasePublishActive"]').forEach((field) => {
        field.addEventListener("change", () => {
          renderPlan();
          renderWorkflowFocus();
          renderLogSummary();
        });
      });

      pluginFilterInput.addEventListener("input", () => {
        commonPluginPage = 1;
        renderPluginAudit();
      });

      pluginPrevButton.addEventListener("click", () => {
        if (commonPluginPage > 1) {
          commonPluginPage -= 1;
          renderPluginAudit();
        }
      });

      pluginNextButton.addEventListener("click", () => {
        commonPluginPage += 1;
        renderPluginAudit();
      });

      authMode.addEventListener("change", updateAuthVisibility);
      useNunjucksLayouts.addEventListener("change", updateNunjucksVisibility);
      convertKadenceBlocks.addEventListener("change", updateNunjucksVisibility);
      useCustomDomain.addEventListener("change", () => {
        updateDomainVisibility();
        renderPlan();
      });

      form.elements.namedItem("wpBaseUrl").addEventListener("input", () => {
        if (!analyzeUrlInput.value) {
          analyzeUrlInput.value = form.elements.namedItem("wpBaseUrl").value;
        }
      });

      outputRootField.addEventListener("input", () => {
        const nextPath = suggestConfigPath(outputRootField.value);
        if (!configPathField.value || configPathField.value === lastSuggestedConfigPath) {
          configPathField.value = nextPath;
        }
        lastSuggestedConfigPath = nextPath;
        renderPlan();
      });

      form.elements.namedItem("localProjectFolder").addEventListener("input", (event) => {
        applyProjectDefaults(event.target.value, true);
      });

      form.addEventListener("input", (event) => {
        if (event.target !== outputRootField) renderPlan();
        renderStylesPanel();
      });

      document.querySelectorAll("[data-help-topic]").forEach((button) => {
        button.addEventListener("click", () => openHelp(button.dataset.helpTopic));
      });

      helpClose.addEventListener("click", () => helpDialog.close());
      helpDialog.addEventListener("click", (event) => {
        const rect = helpDialog.getBoundingClientRect();
        const inside = event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom;
        if (!inside) helpDialog.close();
      });

      saveButton.addEventListener("click", async () => {
        setBusy(true);
        setStatus(t("status_saving"));
        try {
          const data = await callApi("/api/save-config", getPayload());
          latestRawExport = { ...data, deploymentPlan: getPlanState(), phases: getPhaseState() };
          resultNode.textContent = JSON.stringify(latestRawExport, null, 2);
          configPathField.value = data.configPath;
          lastSuggestedConfigPath = data.configPath;
          setStatus(t("status_saved"));
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          setBusy(false);
        }
      });

      function progressFromLog(items, mode) {
        if (!items?.length) return 10;
        const max = mode === "analysis" ? 90 : 92;
        const value = 10 + (items.length * (mode === "analysis" ? 12 : 7));
        return Math.min(max, value);
      }

      async function runWorkflowAnalysis() {
        const payload = getPayload();
        if (!payload.wpBaseUrl) { setStatus(t("hint_wpBaseUrl"), true); return; }
        if (!getPhaseState().analyze) {
          setStatus(t("status_analyze_inactive"), true);
          return;
        }

        setBusy(true);
        setPhaseProgress("analysis", 12, "progress_running_analysis");
        latestRunKind = "analysis";
        migrationLogNode.innerHTML = "";
        migrationLogNode.hidden = false;
        appendLogItems([{ level: "info", msg: t("log_phase_analyze_start") }]);
        setStatus(t("status_analyzing"));
        resultViewNode.hidden = true;
        try {
          const startData = await callApi("/api/analyze", payload);
          let result;
          let pollErrors = 0;
          let seen = 0;
          while (true) {
            await new Promise((resolve) => setTimeout(resolve, 1200));
            let statusData;
            try {
              statusData = await fetchJson(`/api/analyze/${startData.jobId}`);
              pollErrors = 0;
            } catch (pollErr) {
              pollErrors += 1;
              if (pollErrors >= 4) throw pollErr;
              appendLogItems([{ level: "warn", msg: `${t("log_connection_retry")} (${pollErrors}/3)` }]);
              continue;
            }

            const newItems = (statusData.log ?? []).slice(seen);
            appendLogItems(newItems);
            seen += newItems.length;
            setPhaseProgress("analysis", progressFromLog(statusData.log, "analysis"), "progress_running_analysis");

            if (statusData.status === "done") { result = statusData; break; }
            if (statusData.status === "error") throw new Error(statusData.detail || statusData.error);
          }

          latestAnalysisReport = result.report;
          applyAnalysisSuggestions(result.report);
          renderAnalysisSuggestions(result.report);
          analysisSettingsDisclosure.open = true;
          setPhaseProgress("analysis", 100, "progress_done_analysis");
          latestRawExport = { ...buildRawExport(), analysisJob: result };
          resultNode.textContent = JSON.stringify(latestRawExport, null, 2);
          renderAnalysisResult(result.report);
          renderLogSummary();
          renderPlan();
          setStatus(t("status_analysis_done"));
        } catch (error) {
          setPhaseProgress("analysis", 100, "progress_failed_analysis");
          setStatus(error.message, true);
        } finally {
          setBusy(false);
        }
      }

      analyzeButton.addEventListener("click", runWorkflowAnalysis);

      openLogAfterAnalysisButton.addEventListener("click", () => setActiveTab("log-tab"));

      continueToMigrationButton.addEventListener("click", () => {
        form.elements.namedItem("phaseLocalActive").checked = true;
        form.elements.namedItem("phasePublishActive").checked = true;
        migrationStep.open = true;
        continueToMigrationButton.classList.remove("continue-glow");
        updateStepAvailability();
        renderPlan();
        migrationStep.scrollIntoView({ behavior: "smooth", block: "start" });
      });

      openProjectFolderButton.addEventListener("click", async () => {
        migrationStep.open = true;
        migrationSettingsDisclosure.open = true;
        const folderField = form.elements.namedItem("localProjectFolder");
        try {
          const response = await callApi("/api/pick-folder", {});
          if (response.cancelled) return;
          if (!response.folderPath) {
            folderField.focus();
            setStatus(t("status_folder_picker_fallback"));
            return;
          }
          folderField.value = response.folderPath;
        } catch (error) {
          if (error?.name !== "AbortError") setStatus(String(error.message || error), true);
          return;
        }
        applyProjectDefaults(folderField.value, true);
      });

      async function runMigrationJob({ dryRunOverride = null } = {}) {
        if (!getPhaseState().local) {
          setStatus(t("status_local_inactive"), true);
          return;
        }
        const originalDryRun = form.elements.namedItem("dryRun").checked;
        if (dryRunOverride !== null) form.elements.namedItem("dryRun").checked = dryRunOverride;
        const payload = getPayload();

        setBusy(true);
        logSeenCount = 0;
        latestRunKind = "migration";
        migrationLogNode.innerHTML = "";
        migrationLogNode.hidden = false;
        appendLogItems([
          { level: "info", msg: t("log_phase_local_start") },
          { level: "info", msg: `${t("log_phase_publish")}: ${getPhaseState().publish ? t("phase_active_text") : t("phase_inactive_text")}` }
        ]);
        setPhaseProgress("migration", 12, payload.dryRun ? "progress_running_dry_migration" : "progress_running_migration");
        resultViewNode.hidden = true;
        setStatus(t("status_running"));
        try {
          const startData = await callApi("/api/run", payload);
          configPathField.value = startData.configPath;
          lastSuggestedConfigPath = startData.configPath;

          let result;
          let pollErrors = 0;
          while (true) {
            await new Promise((resolve) => setTimeout(resolve, 1500));
            let statusData;
            try {
              statusData = await fetchJson(`/api/run/${startData.jobId}`);
              pollErrors = 0;
            } catch (pollErr) {
              pollErrors += 1;
              if (pollErrors >= 4) throw pollErr;
              appendLogItems([{ level: "warn", msg: `${t("log_connection_retry")} (${pollErrors}/3)` }]);
              continue;
            }

            const newItems = (statusData.log ?? []).slice(logSeenCount);
            appendLogItems(newItems);
            logSeenCount += newItems.length;
            setPhaseProgress("migration", progressFromLog(statusData.log, "migration"), payload.dryRun ? "progress_running_dry_migration" : "progress_running_migration");

            if (statusData.status === "done") { result = statusData; break; }
            if (statusData.status === "error") { throw new Error(statusData.error); }
          }

          latestMigrationReport = result.report;
          latestRawExport = { ...buildRawExport(), migrationJob: result };
          resultNode.textContent = JSON.stringify(latestRawExport, null, 2);
          renderMigrationResult(result.report, payload.dryRun);
          renderLogSummary();
          setPhaseProgress("migration", 100, payload.dryRun ? "progress_done_dry_migration" : "progress_done_migration");
          setStatus(t("status_done"));
        } catch (error) {
          setPhaseProgress("migration", 100, "progress_failed_migration");
          setStatus(error.message, true);
        } finally {
          form.elements.namedItem("dryRun").checked = originalDryRun;
          setBusy(false);
          renderPlan();
        }
      }

      function renderMigrationResult(report, isDryRun) {
        if (!report) { resultViewNode.hidden = true; return; }

        const h = (tag, cls, text) => { const el = document.createElement(tag); if (cls) el.className = cls; if (text != null) el.textContent = text; return el; };
        const div = (cls) => h("div", cls);
        const p = (cls, text) => h("p", cls, text);

        const root = div("rv-body");

        // Title + dry-run badge
        const titleRow = div("rv-title");
        titleRow.appendChild(document.createTextNode(t("status_done")));
        if (isDryRun) {
          const badge = h("span", "rv-badge", t("result_dryrun"));
          titleRow.appendChild(badge);
        }
        root.appendChild(titleRow);

        // Content counts
        if (report.totals && Object.keys(report.totals).length) {
          root.appendChild(p("rv-section", t("result_content")));
          for (const [type, count] of Object.entries(report.totals)) {
            const row = div("rv-row");
            row.appendChild(h("span", null, type));
            row.appendChild(h("span", null, String(count)));
            root.appendChild(row);
          }
        }

        // Styles
        if (report.styles) {
          root.appendChild(p("rv-section", t("result_styles")));
          const s = report.styles;
          if (s.downloaded != null) {
            const row = div("rv-row"); row.appendChild(h("span", null, "Downloaded")); row.appendChild(h("span", null, String(s.downloaded))); root.appendChild(row);
          }
          if (s.outputDir) {
            const row = div("rv-row"); row.appendChild(h("span", null, "Output dir")); row.appendChild(h("span", null, s.outputDir)); root.appendChild(row);
          }
          if (s.legacyStylesInclude) {
            const row = div("rv-row"); row.appendChild(h("span", null, "Legacy styles include")); row.appendChild(h("span", null, s.legacyStylesInclude)); root.appendChild(row);
          }
        }

        // Layouts
        if (report.layouts && report.layouts.generated && report.layouts.generated.length) {
          root.appendChild(p("rv-section", t("result_layouts")));
          const ul = document.createElement("ul");
          for (const path of report.layouts.generated) {
            const li = document.createElement("li"); li.textContent = path; ul.appendChild(li);
          }
          root.appendChild(ul);
        }

        // Menus
        if (report.menus && report.menus.length) {
          root.appendChild(p("rv-section", t("result_menus")));
          for (const m of report.menus) {
            const row = div("rv-row"); row.appendChild(h("span", null, m.name || m.slug || m)); row.appendChild(h("span", null, String(m.itemCount ?? ""))); root.appendChild(row);
          }
        }

        // Warnings
        root.appendChild(p("rv-section", t("result_warnings")));
        const warnings = report.warnings || [];
        if (warnings.length === 0) {
          root.appendChild(p("rv-step", t("result_no_warnings")));
        } else {
          const ul = document.createElement("ul");
          for (const w of warnings) {
            const li = document.createElement("li"); li.className = "rv-warn"; li.textContent = w; ul.appendChild(li);
          }
          root.appendChild(ul);
        }

        // Next steps
        root.appendChild(p("rv-section", t("result_next_steps")));
        const steps = [];
        if (isDryRun) steps.push("Review migration-report.json, then re-run without dry run.");
        if (report.redirects) steps.push("Upload redirects.csv to your hosting redirect rules.");
        if (report.kadencePartials) steps.push("Review generated _includes/blocks/kadence/*.njk partials.");
        if (report.styles?.legacyStylesInclude) steps.push("legacy-styles.njk is auto-included in base layout.");
        steps.push("Run `npx @11ty/eleventy` and check for broken links.");
        const stepsUl = document.createElement("ul");
        for (const s of steps) {
          const li = document.createElement("li"); li.className = "rv-step"; li.textContent = s; stepsUl.appendChild(li);
        }
        root.appendChild(stepsUl);

        resultViewNode.innerHTML = "";
        resultViewNode.appendChild(root);
        resultViewNode.hidden = false;
      }

      function renderAnalysisResult(result) {
        if (!result?.siteInfo) { resultViewNode.hidden = true; return; }

        const h = (tag, cls, text) => { const el = document.createElement(tag); if (cls) el.className = cls; if (text != null) el.textContent = text; return el; };
        const div = (cls) => h("div", cls);
        const p = (cls, text) => h("p", cls, text);
        const root = div("rv-body");

        // Title row
        const titleRow = div("rv-title");
        titleRow.appendChild(document.createTextNode(result.siteInfo.title || result.siteInfo.url));
        if (result.detectedPreset && result.detectedPreset !== "none") {
          titleRow.appendChild(h("span", "rv-badge", result.detectedPreset));
        }
        root.appendChild(titleRow);

        // Content inventory
        if (result.contentInventory && Object.keys(result.contentInventory).length) {
          root.appendChild(p("rv-section", t("result_content")));
          for (const [, info] of Object.entries(result.contentInventory)) {
            if (info.count === 0) continue;
            const row = div("rv-row");
            row.appendChild(h("span", null, info.label || info.restBase));
            row.appendChild(h("span", null, String(info.count)));
            root.appendChild(row);
          }
        }

        // Detected plugins
        root.appendChild(p("rv-section", t("analyze_plugins_title")));
        if (result.detectedPlugins?.length) {
          const ul = document.createElement("ul");
          for (const plugin of result.detectedPlugins) {
            const li = document.createElement("li");
            li.textContent = `${plugin.name} — ${plugin.replacement}`;
            ul.appendChild(li);
          }
          root.appendChild(ul);
        } else {
          root.appendChild(p("rv-step", t("analysis_result_no_plugins")));
        }

        // Warnings
        root.appendChild(p("rv-section", t("result_warnings")));
        const warnings = result.warnings || [];
        if (!warnings.length) {
          root.appendChild(p("rv-step", t("result_no_warnings")));
        } else {
          const ul = document.createElement("ul");
          for (const w of warnings) {
            const li = h("li", "rv-warn", w); ul.appendChild(li);
          }
          root.appendChild(ul);
        }

        // Apply button hint
        root.appendChild(p("rv-step", t("btn_apply_analysis") + " →"));

        resultViewNode.innerHTML = "";
        resultViewNode.appendChild(root);
        resultViewNode.hidden = false;
      }

      function renderLogSummary() {
        const phases = getPhaseState();
        const plan = getPlanState();
        const cards = [];

        cards.push(`
          <section class="log-summary-card">
            <h3>${t("log_card_phases")}</h3>
            <ul>
              <li>${t("log_phase_analyze")}: ${phases.analyze ? t("phase_active_text") : t("phase_inactive_text")}</li>
              <li>${t("log_phase_local")}: ${phases.local ? t("phase_active_text") : t("phase_inactive_text")}</li>
              <li>${t("log_phase_publish")}: ${phases.publish ? t("phase_active_text") : t("phase_inactive_text")}</li>
            </ul>
          </section>
        `);

        if (latestAnalysisReport?.analysis) {
          const analysis = latestAnalysisReport.analysis;
          const selectedReplacements = getSelectedEleventyReplacements();
          const enabledReplacements = selectedReplacements.filter((item) => item.enabled);
          cards.push(`
            <section class="log-summary-card">
              <h3>${t("log_card_analysis")}</h3>
              <p>${analysis.theme?.slug || t("log_unknown_theme")}</p>
              <ul>
                <li>${t("analysis_result_stylesheets")}: ${analysis.styles?.stylesheetCount ?? 0}</li>
                <li>${t("analysis_result_navigation")}: ${analysis.structure?.navigationCount ?? 0}</li>
                <li>${t("analysis_result_plugins")}: ${(analysis.plugins || []).length}</li>
                <li>${t("plugin_compare_eleventy")}: ${enabledReplacements.length}/${selectedReplacements.length}</li>
              </ul>
            </section>
          `);
        }

        if (latestMigrationReport) {
          const totals = Object.entries(latestMigrationReport.totals || {}).map(([key, value]) => `${key}: ${value}`).join(", ") || t("log_no_migration");
          cards.push(`
            <section class="log-summary-card">
              <h3>${t("log_card_migration")}</h3>
              <p>${totals}</p>
              <ul>
                <li>${t("log_redirects")}: ${(latestMigrationReport.redirects || []).length}</li>
                <li>${t("result_warnings")}: ${(latestMigrationReport.warnings || []).length}</li>
                <li>${t("log_output_root")}: ${latestMigrationReport.outputRoot || plan.outputRoot || "-"}</li>
                <li>${t("plugin_compare_eleventy")}: ${latestMigrationReport.eleventyPlugins?.enabled ?? 0}/${latestMigrationReport.eleventyPlugins?.selected ?? 0}</li>
              </ul>
            </section>
          `);
        }

        if (!latestAnalysisReport && !latestMigrationReport) {
          cards.push(`
            <section class="log-summary-card">
              <h3>${t("log_card_waiting")}</h3>
              <p>${t("log_waiting_body")}</p>
            </section>
          `);
        }

        logSummaryNode.innerHTML = cards.join("");
      }

      let logSeenCount = 0;

      function appendLogItems(items) {
        if (!items?.length) return;
        const levelClass = { ok: "log-ok", warn: "log-warn", info: "log-info", item: "log-item-row" };
        const levelPrefix = { ok: "✓", warn: "⚠", info: "→", item: "·" };
        for (const entry of items) {
          const row = document.createElement("div");
          row.className = `log-item ${levelClass[entry.level] ?? "log-info"}`;
          row.textContent = `${levelPrefix[entry.level] ?? " "} ${entry.msg}`;
          migrationLogNode.appendChild(row);
        }
        migrationLogNode.scrollTop = migrationLogNode.scrollHeight;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        await runMigrationJob({ dryRunOverride: false });
      });

      dryRunButton.addEventListener("click", async () => {
        await runMigrationJob({ dryRunOverride: true });
      });

      exportJsonButton.addEventListener("click", () => {
        const payload = latestRawExport || buildRawExport();
        const blob = new Blob([`${JSON.stringify(payload, null, 2)}\n`], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = "wp-eleventy-log-export.json";
        anchor.click();
        URL.revokeObjectURL(url);
      });

      applyTranslations();
      setActiveTab("workflow-tab");
      loadDefaults().catch((error) => {
        setStatus(error.message, true);
        resultNode.textContent = error.stack || String(error);
      });
    </script>
  </body>
</html>
