<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WP -> Eleventy Migrator</title>
    <style>
      :root {
        --bg: #efe6d8;
        --bg-grad-top: rgba(15, 118, 110, 0.14);
        --bg-grad-right: rgba(217, 119, 6, 0.12);
        --panel: rgba(255, 251, 244, 0.92);
        --panel-strong: #fffdf8;
        --ink: #1b1a18;
        --muted: #685f55;
        --line: rgba(27, 26, 24, 0.12);
        --accent: #0f766e;
        --accent-strong: #115e59;
        --accent-soft: rgba(15, 118, 110, 0.1);
        --danger: #b91c1c;
        --shadow: 0 26px 80px rgba(83, 59, 22, 0.14);
        --console-bg: #101411;
        --console-ink: #d7fce7;
        --control-bg: #fffdfa;
        --secondary-bg: #ebe4d7;
      }

      body[data-theme="dark"] {
        --bg: #111514;
        --bg-grad-top: rgba(45, 212, 191, 0.12);
        --bg-grad-right: rgba(245, 158, 11, 0.1);
        --panel: rgba(21, 28, 26, 0.9);
        --panel-strong: #19211f;
        --ink: #edf2ef;
        --muted: #9eb0aa;
        --line: rgba(237, 242, 239, 0.11);
        --accent: #2dd4bf;
        --accent-strong: #7eead8;
        --accent-soft: rgba(45, 212, 191, 0.12);
        --danger: #f87171;
        --shadow: 0 26px 80px rgba(0, 0, 0, 0.3);
        --console-bg: #09100e;
        --console-ink: #bbf7d0;
        --control-bg: #111917;
        --secondary-bg: #24302d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, var(--bg-grad-top), transparent 34%),
          radial-gradient(circle at right center, var(--bg-grad-right), transparent 28%),
          linear-gradient(180deg, color-mix(in srgb, var(--bg) 88%, white 12%) 0%, var(--bg) 100%);
        transition: background 150ms ease, color 150ms ease;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .shell {
        width: min(1280px, calc(100vw - 28px));
        margin: 24px auto 40px;
        display: grid;
        gap: 20px;
      }

      .hero,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero {
        padding: 28px;
        display: grid;
        grid-template-columns: 1.7fr 1fr;
        gap: 22px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
      }

      .topbar-controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .control-pill {
        display: grid;
        gap: 6px;
        min-width: 130px;
      }

      .control-pill span {
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .control-pill select {
        background: var(--control-bg);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent-strong);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.2rem, 5vw, 4.1rem);
        line-height: 0.94;
        letter-spacing: -0.05em;
      }

      .lede,
      .step-lede,
      .hint,
      .status,
      .meta,
      .card p,
      label span {
        color: var(--muted);
      }

      .lede {
        max-width: 60ch;
        line-height: 1.65;
      }

      .hero-side {
        display: grid;
        gap: 14px;
      }

      .card {
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 16px 18px;
      }

      .card strong {
        display: block;
        margin-bottom: 6px;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .chip {
        border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
        background: color-mix(in srgb, var(--panel-strong) 85%, transparent);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.92rem;
      }

      .layout {
        display: grid;
        grid-template-columns: 1.45fr 0.92fr;
        gap: 20px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .tab-button {
        background: var(--secondary-bg);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .tab-button.is-active {
        background: var(--accent);
        color: #fff;
      }

      .tab-panel[hidden] {
        display: none;
      }

      .panel {
        padding: 24px;
      }

      form {
        display: grid;
        gap: 14px;
      }

      .step {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: color-mix(in srgb, var(--panel-strong) 92%, transparent);
        overflow: hidden;
      }

      .step summary {
        list-style: none;
        cursor: pointer;
        padding: 18px 20px;
      }

      .step summary::-webkit-details-marker {
        display: none;
      }

      .step-head {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 14px;
        align-items: center;
      }

      .step-number {
        width: 38px;
        height: 38px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-weight: 800;
      }

      .step-title {
        margin: 0;
        font-size: 1.08rem;
      }

      .step-lede {
        margin: 4px 0 0;
        font-size: 0.95rem;
      }

      .step-toggle {
        color: var(--accent-strong);
        font-weight: 700;
      }

      .step-body {
        padding: 0 20px 20px;
        display: grid;
        gap: 18px;
      }

      .section-head {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .section-title {
        margin: 0;
        font-size: 1rem;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-1 {
        grid-template-columns: 1fr;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }

      .field-head {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        background: var(--control-bg);
        color: var(--ink);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .toggle-row {
        display: grid;
        gap: 12px;
      }

      .toggle {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel-strong);
      }

      .toggle input {
        width: 18px;
        height: 18px;
        margin-top: 2px;
      }

      .subtle-box {
        border: 1px dashed color-mix(in srgb, var(--accent) 30%, transparent);
        border-radius: 16px;
        padding: 16px;
        background: color-mix(in srgb, var(--accent-soft) 80%, transparent);
      }

      .subtle-box p {
        margin: 0;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 4px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        cursor: pointer;
        transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
        transform: none;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .secondary {
        background: var(--secondary-bg);
        color: var(--ink);
      }

      .help-button {
        display: inline-grid;
        place-items: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
        background: color-mix(in srgb, var(--accent-soft) 80%, transparent);
        color: var(--accent-strong);
        font-weight: 800;
        line-height: 1;
      }

      .status {
        min-height: 24px;
        font-size: 0.96rem;
      }

      .status.error {
        color: var(--danger);
      }

      .side-stack {
        display: grid;
        gap: 20px;
        align-content: start;
      }

      .side-title {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .plan-list,
      .check-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      .plan-list li,
      .check-list li {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px 16px;
        background: var(--panel-strong);
      }

      .plugin-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .plugin-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: var(--panel-strong);
        display: grid;
        gap: 10px;
      }

      .plugin-card h3 {
        margin: 0;
        font-size: 1rem;
      }

      .plugin-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .plugin-badge {
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.8rem;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--accent-soft) 80%, transparent);
        color: var(--accent-strong);
      }

      .plugin-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .plugin-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        display: grid;
        gap: 8px;
      }

      .plan-list strong,
      .check-list strong {
        display: block;
        margin-bottom: 4px;
      }

      .result {
        background: var(--console-bg);
        color: var(--console-ink);
        border-radius: 18px;
        padding: 18px;
        overflow: auto;
        min-height: 320px;
      }

      .result pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.9rem;
        line-height: 1.55;
      }

      .auth-fields[hidden],
      .domain-fields[hidden],
      .nunjucks-fields[hidden] {
        display: none;
      }

      dialog.help-dialog {
        width: min(640px, calc(100vw - 24px));
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 0;
        background: var(--panel-strong);
        color: var(--ink);
        box-shadow: var(--shadow);
      }

      dialog.help-dialog::backdrop {
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(4px);
      }

      .help-shell {
        padding: 24px;
        display: grid;
        gap: 16px;
      }

      .help-topbar {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
      }

      .help-topbar h3 {
        margin: 0;
        font-size: 1.35rem;
      }

      .help-close {
        min-width: 42px;
        height: 42px;
        padding: 0;
        background: var(--secondary-bg);
        color: var(--ink);
      }

      .help-body {
        color: var(--muted);
        line-height: 1.65;
      }

      .help-body p,
      .help-body ul {
        margin: 0 0 12px;
      }

      .help-body ul {
        padding-left: 18px;
      }

      @media (max-width: 980px) {
        .hero,
        .layout,
        .grid,
        .topbar,
        .plugin-grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          display: grid;
        }
      }
    </style>
  </head>
  <body data-theme="light">
    <main class="shell">
      <section class="hero">
        <div>
          <div class="topbar">
            <div>
              <p class="eyebrow" data-i18n="hero_eyebrow"></p>
              <h1 data-i18n="hero_title"></h1>
            </div>
            <div class="topbar-controls">
              <label class="control-pill">
                <span data-i18n="ui_language"></span>
                <select id="language-select">
                  <option value="fi">Suomi</option>
                  <option value="en">English</option>
                </select>
              </label>
              <label class="control-pill">
                <span data-i18n="ui_theme"></span>
                <select id="theme-select">
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                </select>
              </label>
            </div>
          </div>
          <p class="lede" data-i18n="hero_lede"></p>
          <div class="chip-row">
            <div class="chip" data-i18n="chip_1"></div>
            <div class="chip" data-i18n="chip_2"></div>
            <div class="chip" data-i18n="chip_3"></div>
            <div class="chip" data-i18n="chip_4"></div>
            <div class="chip" data-i18n="chip_5"></div>
            <div class="chip" data-i18n="chip_6"></div>
          </div>
        </div>
        <div class="hero-side">
          <div class="card">
            <strong data-i18n="hero_card1_title"></strong>
            <p data-i18n="hero_card1_body"></p>
          </div>
          <div class="card">
            <strong data-i18n="hero_card2_title"></strong>
            <p data-i18n="hero_card2_body"></p>
          </div>
        </div>
      </section>

      <section class="layout">
        <div class="panel">
          <div class="tabs">
            <button type="button" class="tab-button is-active" data-tab-target="workflow-tab" id="workflow-tab-button" data-i18n="tab_workflow"></button>
            <button type="button" class="tab-button" data-tab-target="plugins-tab" id="plugins-tab-button" data-i18n="tab_plugins"></button>
          </div>
        </div>
      </section>

      <section class="layout tab-panel" id="workflow-tab">
        <div class="panel">
          <form id="migration-form">
            <details class="step" open>
              <summary>
                <div class="step-head">
                  <div class="step-number">1</div>
                  <div>
                    <h2 class="step-title" data-i18n="step1_title"></h2>
                    <p class="step-lede" data-i18n="step1_lede"></p>
                  </div>
                  <div class="step-toggle" data-i18n="step_toggle"></div>
                </div>
              </summary>
              <div class="step-body">
                <div class="section-head">
                  <h3 class="section-title" data-i18n="source_section"></h3>
                  <button type="button" class="help-button" data-help-topic="source-overview">?</button>
                </div>
                <div class="grid">
                  <label>
                    <span class="field-head"><span data-i18n="field_sourceType"></span> <button type="button" class="help-button" data-help-topic="sourceType">?</button></span>
                    <select name="sourceType">
                      <option value="rest">rest</option>
                      <option value="xml">xml</option>
                      <option value="json">json</option>
                    </select>
                    <span data-i18n="hint_sourceType"></span>
                  </label>
                  <label>
                    <span class="field-head"><span data-i18n="field_restNamespace"></span> <button type="button" class="help-button" data-help-topic="restNamespace">?</button></span>
                    <input name="restNamespace" required>
                    <span data-i18n="hint_restNamespace"></span>
                  </label>
                </div>
                <div class="grid grid-1">
                  <label>
                    <span class="field-head"><span data-i18n="field_wpBaseUrl"></span> <button type="button" class="help-button" data-help-topic="wpBaseUrl">?</button></span>
                    <input name="wpBaseUrl" type="url" required data-i18n-placeholder="placeholder_wpBaseUrl">
                    <span data-i18n="hint_wpBaseUrl"></span>
                  </label>
                </div>

                <div class="section-head">
                  <h3 class="section-title" data-i18n="content_section"></h3>
                  <button type="button" class="help-button" data-help-topic="content-overview">?</button>
                </div>
                <div class="grid">
                  <label>
                    <span class="field-head"><span data-i18n="field_contentTypes"></span> <button type="button" class="help-button" data-help-topic="contentTypes">?</button></span>
                    <input name="contentTypes" data-i18n-placeholder="placeholder_contentTypes">
                    <span data-i18n="hint_contentTypes"></span>
                  </label>
                  <label>
                    <span class="field-head"><span data-i18n="field_htmlMode"></span> <button type="button" class="help-button" data-help-topic="htmlMode">?</button></span>
                    <select name="htmlMode">
                      <option value="keep-html" data-i18n="option_keep_html"></option>
                      <option value="basic-markdown" data-i18n="option_basic_markdown"></option>
                    </select>
                    <span data-i18n="hint_htmlMode"></span>
                  </label>
                  <label>
                    <span class="field-head"><span data-i18n="field_permalink"></span> <button type="button" class="help-button" data-help-topic="targetPermalinkPattern">?</button></span>
                    <input name="targetPermalinkPattern" data-i18n-placeholder="placeholder_permalink">
                    <span data-i18n="hint_permalink"></span>
                  </label>
                </div>
                <div class="toggle-row">
                  <label class="toggle">
                    <input name="includeDrafts" type="checkbox">
                    <span data-i18n="toggle_includeDrafts"></span> <button type="button" class="help-button" data-help-topic="includeDrafts">?</button>
                  </label>
                  <label class="toggle">
                    <input name="downloadMedia" type="checkbox">
                    <span data-i18n="toggle_downloadMedia"></span> <button type="button" class="help-button" data-help-topic="downloadMedia">?</button>
                  </label>
                  <label class="toggle">
                    <input name="createRedirects" type="checkbox">
                    <span data-i18n="toggle_createRedirects"></span> <button type="button" class="help-button" data-help-topic="createRedirects">?</button>
                  </label>
                  <label class="toggle">
                    <input name="dryRun" type="checkbox">
                    <span data-i18n="toggle_dryRun"></span> <button type="button" class="help-button" data-help-topic="dryRun">?</button>
                  </label>
                  <label class="toggle">
                    <input name="useNunjucksLayouts" type="checkbox" id="useNunjucksLayouts">
                    <span data-i18n="toggle_useNunjucksLayouts"></span> <button type="button" class="help-button" data-help-topic="useNunjucksLayouts">?</button>
                  </label>
                  <label class="toggle">
                    <input name="convertKadenceBlocks" type="checkbox" id="convertKadenceBlocks">
                    <span data-i18n="toggle_convertKadenceBlocks"></span> <button type="button" class="help-button" data-help-topic="convertKadenceBlocks">?</button>
                  </label>
                </div>
                <div id="nunjucks-fields" class="grid nunjucks-fields" hidden>
                  <label>
                    <span class="field-head"><span data-i18n="field_pageLayout"></span> <button type="button" class="help-button" data-help-topic="pageLayout">?</button></span>
                    <input name="pageLayout" data-i18n-placeholder="placeholder_pageLayout">
                    <span data-i18n="hint_pageLayout"></span>
                  </label>
                  <label>
                    <span class="field-head"><span data-i18n="field_postLayout"></span> <button type="button" class="help-button" data-help-topic="postLayout">?</button></span>
                    <input name="postLayout" data-i18n-placeholder="placeholder_postLayout">
                    <span data-i18n="hint_postLayout"></span>
                  </label>
                  <label>
                    <span class="field-head"><span data-i18n="field_defaultLayout"></span> <button type="button" class="help-button" data-help-topic="defaultLayout">?</button></span>
                    <input name="defaultLayout" data-i18n-placeholder="placeholder_defaultLayout">
                    <span data-i18n="hint_defaultLayout"></span>
                  </label>
                  <label>
                    <span class="field-head"><span data-i18n="field_kadenceBlocksDir"></span> <button type="button" class="help-button" data-help-topic="kadenceBlocksDir">?</button></span>
                    <input name="kadenceBlocksDir" data-i18n-placeholder="placeholder_kadenceBlocksDir">
                    <span data-i18n="hint_kadenceBlocksDir"></span>
                  </label>
                </div>

                <div class="section-head">
                  <h3 class="section-title" data-i18n="auth_section"></h3>
                  <button type="button" class="help-button" data-help-topic="auth-overview">?</button>
                </div>
                <div class="grid">
                  <label>
                    <span class="field-head"><span data-i18n="field_authMode"></span> <button type="button" class="help-button" data-help-topic="authMode">?</button></span>
                    <select name="authMode" id="authMode">
                      <option value="none" data-i18n="option_auth_none"></option>
                      <option value="app-password" data-i18n="option_auth_app_password"></option>
                      <option value="bearer" data-i18n="option_auth_bearer"></option>
                    </select>
                    <span data-i18n="hint_authMode"></span>
                  </label>
                </div>
                <div id="app-password-fields" class="grid auth-fields" hidden>
                  <label>
                    <span class="field-head"><span data-i18n="field_wpUser"></span> <button type="button" class="help-button" data-help-topic="wpUser">?</button></span>
                    <input name="wpUser">
                  </label>
                  <label>
                    <span class="field-head"><span data-i18n="field_wpAppPassword"></span> <button type="button" class="help-button" data-help-topic="wpAppPassword">?</button></span>
                    <input name="wpAppPassword" type="password">
                  </label>
                </div>
                <div id="bearer-fields" class="grid auth-fields" hidden>
                  <label>
                    <span class="field-head"><span data-i18n="field_wpBearerToken"></span> <button type="button" class="help-button" data-help-topic="wpBearerToken">?</button></span>
                    <input name="wpBearerToken" type="password">
                  </label>
                </div>

                <div class="section-head">
                  <h3 class="section-title" data-i18n="output_section"></h3>
                  <button type="button" class="help-button" data-help-topic="output-overview">?</button>
                </div>
                <div class="grid">
                  <label>
                    <span class="field-head"><span data-i18n="field_localProjectFolder"></span> <button type="button" class="help-button" data-help-topic="localProjectFolder">?</button></span>

      function t(key) {
        return translations[currentLang][key] ?? key;
      }

      function applyTranslations() {
        document.documentElement.lang = currentLang;
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          node.textContent = t(node.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
          node.placeholder = t(node.dataset.i18nPlaceholder);
        });
        document.title = t("hero_title");
        renderChecklist();
        renderPlan();
        renderPluginAudit();
      }

      function renderChecklist() {
        checklist.innerHTML = translations[currentLang].checklist_items.map(([title, body]) => `
          <li>
            <strong>${title}</strong>
            <span class="meta">${body}</span>
          </li>
        `).join("");
      }

      function mergedPluginItems() {
        const seen = new Set();
        const merged = [];
        for (const item of [...pluginAuditData[currentLang], ...commonPluginAuditData[currentLang]]) {
          const key = String(item.slug || item.name).toLowerCase();
          if (seen.has(key)) continue;
          seen.add(key);
          merged.push(item);
        }
        return merged;
      }

      function renderPluginAudit() {
        const query = String(pluginFilterInput.value || "").trim().toLowerCase();
        const allItems = mergedPluginItems();
        const items = allItems.filter((item) =>
          !query ||
          item.name.toLowerCase().includes(query) ||
          String(item.slug || "").toLowerCase().includes(query) ||
          item.category.toLowerCase().includes(query)
        );

        const totalPages = Math.max(1, Math.ceil(items.length / commonPluginsPerPage));
        if (commonPluginPage > totalPages) commonPluginPage = totalPages;
        const start = (commonPluginPage - 1) * commonPluginsPerPage;
        const pageItems = items.slice(start, start + commonPluginsPerPage);

        pluginGrid.innerHTML = pageItems.map((item) => `
          <article class="plugin-card">
            <div>
              <h3>${item.name}</h3>
            </div>
            <div class="plugin-meta">
              <span class="plugin-badge">${item.category}</span>
              <span class="plugin-badge">${item.effort}</span>
              ${item.slug ? `<span class="plugin-badge">${item.slug}</span>` : ""}
            </div>
            <p><strong>${t("plugin_replacement_label")}:</strong> ${item.replacement}</p>
            <p>${item.note}</p>
          </article>
        `).join("");

        pluginSummary.innerHTML = translations[currentLang].plugin_summary_items.map(([title, body]) => `
          <li>
            <strong>${title}</strong>
            <span class="meta">${body}</span>
          </li>
        `).join("");

        pluginRisks.innerHTML = translations[currentLang].plugin_risk_items.map((item) => `<li>${item}</li>`).join("");
        pluginPageStatus.textContent = t("plugin_page_status")
          .replace("{page}", String(commonPluginPage))
          .replace("{pages}", String(totalPages))
          .replace("{count}", String(items.length));

        pluginPrevButton.disabled = commonPluginPage <= 1;
        pluginNextButton.disabled = commonPluginPage >= totalPages;
      }

      function setActiveTab(tabId) {
        currentTab = tabId;
        workflowTab.hidden = tabId !== "workflow-tab";
        pluginsTab.hidden = tabId !== "plugins-tab";
        tabButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.tabTarget === tabId);
        });
      }

      function setTheme(theme) {
        currentTheme = theme;
        document.body.dataset.theme = theme;
      }

      function setBusy(isBusy) {
        saveButton.disabled = isBusy;
        runButton.disabled = isBusy;
      }

      function setStatus(message, isError = false) {
        statusNode.textContent = message;
        statusNode.classList.toggle("error", isError);
      }

      function updateAuthVisibility() {
        appPasswordFields.hidden = authMode.value !== "app-password";
        bearerFields.hidden = authMode.value !== "bearer";
      }

      function updateDomainVisibility() {
        domainFields.hidden = !useCustomDomain.checked;
      }

      function updateNunjucksVisibility() {
        nunjucksFields.hidden = !(useNunjucksLayouts.checked || convertKadenceBlocks.checked);
      }

      function suggestConfigPath(outputRoot) {
        const base = String(outputRoot || "").replace(/\/+$/, "");
        return base ? `${base}/migration-config.json` : "./migrations/wp-to-eleventy/migration-config.json";
      }

      function openHelp(topic) {
        const entry = helpContent[topic]?.[currentLang];
        if (!entry) return;
        helpTitle.textContent = entry.title;
        helpBody.innerHTML = entry.body;
        helpDialog.showModal();
      }

      function getPayload() {
        const data = new FormData(form);
        return {
          sourceType: data.get("sourceType"),
          wpBaseUrl: data.get("wpBaseUrl"),
          restNamespace: data.get("restNamespace"),
          contentTypes: data.get("contentTypes"),
          includeDrafts: data.get("includeDrafts") === "on",
          downloadMedia: data.get("downloadMedia") === "on",
          createRedirects: data.get("createRedirects") === "on",
          htmlMode: data.get("htmlMode"),
          targetPermalinkPattern: data.get("targetPermalinkPattern"),
          authMode: data.get("authMode"),
          wpUser: data.get("wpUser"),
          wpAppPassword: data.get("wpAppPassword"),
          wpBearerToken: data.get("wpBearerToken"),
          dryRun: data.get("dryRun") === "on",
          useNunjucksLayouts: data.get("useNunjucksLayouts") === "on",
          convertKadenceBlocks: data.get("convertKadenceBlocks") === "on",
          pageLayout: data.get("pageLayout"),
          postLayout: data.get("postLayout"),
          defaultLayout: data.get("defaultLayout"),
          kadenceBlocksDir: data.get("kadenceBlocksDir"),
          outputRoot: data.get("outputRoot"),
          contentDir: data.get("contentDir"),
          mediaDir: data.get("mediaDir"),
          configPath: data.get("configPath")
        };
      }

      function getPlanState() {
        const data = new FormData(form);
        return {
          wpBaseUrl: data.get("wpBaseUrl"),
          contentTypes: data.get("contentTypes"),
          localProjectFolder: data.get("localProjectFolder"),
          outputRoot: data.get("outputRoot"),
          localDevCommand: data.get("localDevCommand"),
          localSiteUrl: data.get("localSiteUrl"),
          githubOwner: data.get("githubOwner"),
          githubRepo: data.get("githubRepo"),
          pagesUrl: data.get("pagesUrl"),
          buildCommand: data.get("buildCommand"),
          useGitHubActions: data.get("useGitHubActions") === "on",
          publishOnPush: data.get("publishOnPush") === "on",
          useCustomDomain: data.get("useCustomDomain") === "on",
          domainAction: data.get("domainAction"),
          desiredDomain: data.get("desiredDomain"),
          registrar: data.get("registrar"),
          dnsNotes: data.get("dnsNotes")
        };
      }

      function renderPlan() {
        const state = getPlanState();
        const planLabels = translations[currentLang].plan_labels;
        const planText = translations[currentLang].plan_text;
        const repoLabel = state.githubOwner && state.githubRepo ? `${state.githubOwner}/${state.githubRepo}` : planText.missingRepo;
        const domainLine = state.useCustomDomain
          ? `${state.domainAction === "point-existing" ? planText.existingDomain : planText.newDomain}: ${state.desiredDomain || "-"}; registrar ${state.registrar || "-"}; ${state.dnsNotes || planText.dnsMissing}`
          : planText.noDomain;

        const items = [
          {
            title: planLabels.p1_extract,
            text: `${state.wpBaseUrl || "-"} -> ${state.contentTypes || "posts,pages"}`
          },
          {
            title: planLabels.p1_output,
            text: `${state.localProjectFolder || planText.missingProject}; ${state.outputRoot || "./migrations/..."}`
          },
          {
            title: planLabels.p1_local,
            text: `${state.localDevCommand || "npx @11ty/eleventy --serve"} -> ${state.localSiteUrl || "http://127.0.0.1:8080/"}`
          },
          {
            title: planLabels.p2_repo,
            text: `${repoLabel} -> ${state.pagesUrl || "https://username.github.io/repo/"}`
          },
          {
            title: planLabels.p2_actions,
            text: state.useGitHubActions
              ? `${state.buildCommand || "npx @11ty/eleventy"}; ${state.publishOnPush ? planText.deployPush : planText.deployManual}`
              : planText.actionsDisabled
          },
          {
            title: planLabels.p2_domain,
            text: domainLine
          }
        ];

        planPreview.innerHTML = items.map((item) => `
          <li>
            <strong>${item.title}</strong>
            <span class="meta">${item.text}</span>
          </li>
        `).join("");
      }

      function fillForm(values) {
        Object.entries(values).forEach(([key, value]) => {
          const field = form.elements.namedItem(key);
          if (!field) return;
          if (field.type === "checkbox") field.checked = Boolean(value);
          else field.value = value ?? "";
        });

        const defaults = {
          githubOwner: "",
          githubRepo: "",
          pagesUrl: "",
          localProjectFolder: "",
          localDevCommand: "npx @11ty/eleventy --serve",
          localSiteUrl: "http://127.0.0.1:8080/",
          buildCommand: "npx @11ty/eleventy",
          useGitHubActions: true,
          publishOnPush: true,
          useCustomDomain: false,
          useNunjucksLayouts: false,
          convertKadenceBlocks: false,
          pageLayout: "layouts/page.njk",
          postLayout: "layouts/post.njk",
          defaultLayout: "",
          kadenceBlocksDir: "_includes/blocks/kadence",
          domainAction: "buy-new",
          desiredDomain: "",
          registrar: "",
          dnsNotes: ""
        };

        Object.entries(defaults).forEach(([key, value]) => {
          const field = form.elements.namedItem(key);
          if (!field) return;
          if (field.type === "checkbox") field.checked = Boolean(value);
          else if (!field.value) field.value = value;
        });

        lastSuggestedConfigPath = configPathField.value;
        updateAuthVisibility();
        updateDomainVisibility();
        updateNunjucksVisibility();
        renderPlan();
      }

      async function callApi(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Request failed");
        return data;
      }

      async function loadDefaults() {
        resultNode.textContent = t("result_loading");
        const response = await fetch("/api/defaults");
        const data = await response.json();
        fillForm(data);
        resultNode.textContent = JSON.stringify(data, null, 2);
        setStatus(t("status_defaults_loaded"));
      }

      languageSelect.addEventListener("change", () => {
        currentLang = languageSelect.value;
        applyTranslations();
      });

      themeSelect.addEventListener("change", () => {
        setTheme(themeSelect.value);
      });

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => setActiveTab(button.dataset.tabTarget));
      });

      pluginFilterInput.addEventListener("input", () => {
        commonPluginPage = 1;
        renderPluginAudit();
      });

      pluginPrevButton.addEventListener("click", () => {
        if (commonPluginPage > 1) {
          commonPluginPage -= 1;
          renderPluginAudit();
        }
      });

      pluginNextButton.addEventListener("click", () => {
        commonPluginPage += 1;
        renderPluginAudit();
      });

      authMode.addEventListener("change", updateAuthVisibility);
      useNunjucksLayouts.addEventListener("change", updateNunjucksVisibility);
      convertKadenceBlocks.addEventListener("change", updateNunjucksVisibility);
      useCustomDomain.addEventListener("change", () => {
        updateDomainVisibility();
        renderPlan();
      });

      outputRootField.addEventListener("input", () => {
        const nextPath = suggestConfigPath(outputRootField.value);
        if (!configPathField.value || configPathField.value === lastSuggestedConfigPath) {
          configPathField.value = nextPath;
        }
        lastSuggestedConfigPath = nextPath;
        renderPlan();
      });

      form.addEventListener("input", (event) => {
        if (event.target !== outputRootField) renderPlan();
      });

      document.querySelectorAll("[data-help-topic]").forEach((button) => {
        button.addEventListener("click", () => openHelp(button.dataset.helpTopic));
      });

      helpClose.addEventListener("click", () => helpDialog.close());
      helpDialog.addEventListener("click", (event) => {
        const rect = helpDialog.getBoundingClientRect();
        const inside = event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom;
        if (!inside) helpDialog.close();
      });

      saveButton.addEventListener("click", async () => {
        setBusy(true);
        setStatus(t("status_saving"));
        try {
          const data = await callApi("/api/save-config", getPayload());
          resultNode.textContent = JSON.stringify({ ...data, deploymentPlan: getPlanState() }, null, 2);
          configPathField.value = data.configPath;
          lastSuggestedConfigPath = data.configPath;
          setStatus(t("status_saved"));
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          setBusy(false);
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setBusy(true);
        setStatus(t("status_running"));
        try {
          const data = await callApi("/api/run", getPayload());
          resultNode.textContent = JSON.stringify({ ...data, deploymentPlan: getPlanState() }, null, 2);
          configPathField.value = data.configPath;
          lastSuggestedConfigPath = data.configPath;
          setStatus(t("status_done"));
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          setBusy(false);
        }
      });

      applyTranslations();
      setActiveTab("workflow-tab");
      loadDefaults().catch((error) => {
        setStatus(error.message, true);
        resultNode.textContent = error.stack || String(error);
      });
    </script>
  </body>
</html>
